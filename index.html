<script>

async function uploadPhoto(){

    const file =
        document.getElementById('photo').files[0];

    if(!file){

        alert('Выберите фото');

        return;
    }

    document.getElementById('status')
        .innerHTML = 'Проверка лица...';

    const formData = new FormData();

    formData.append(
        'photo',
        file
    );

    try{

        const response =
            await fetch(
                'https://problem-squeamish-unlawful.ngrok-free.dev/recognize',
                {
                    method:'POST',
                    body:formData
                }
            );

        const data =
            await response.json();

        document.getElementById('status')
            .innerHTML = data.message;

    }

    catch(error){

        document.getElementById('status')
            .innerHTML =
                'Ошибка соединения';

    }

}

</script>
