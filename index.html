<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Face ID</title>

<style>

body{
    font-family:Arial;
    text-align:center;
    background:#f5f5f5;
    padding-top:40px;
}

h1{
    font-size:40px;
}

input{
    font-size:20px;
    margin-top:30px;
}

button{
    margin-top:30px;
    font-size:24px;
    padding:20px;
    width:80%;
    max-width:300px;
    border:none;
    border-radius:15px;
    background:#1f7aec;
    color:white;
}

#status{
    margin-top:30px;
    font-size:22px;
}

</style>

</head>

<body>

<h1>Face ID</h1>

<input
    type="file"
    accept="image/*"
    capture="user"
    id="photo"
>

<br>

<button onclick="uploadPhoto()">
Отправить фото при начале работы
</button>

<br><br>

<button onclick="uploadPhoto()">
Отправить фото в конце работы
</button>

<div id="status"></div>

<script>

async function uploadPhoto(){

    const file =
        document.getElementById('photo').files[0];

    if(!file){

        alert('Выберите фото');

        return;
    }

    document.getElementById('status')
        .innerHTML = 'Отправка...';

    const reader = new FileReader();

    reader.onloadend = async function(){

        const base64 =
            reader.result;

        await fetch(
            'https://problem-squeamish-unlawful.ngrok-free.dev/recognize',
            {
                method:'POST',
                body:base64
            }
        );

        document.getElementById('status')
            .innerHTML = 'Фото отправлено';

    };

    reader.readAsDataURL(file);

}

</script>

</body>
</html>
