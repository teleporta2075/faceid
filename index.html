<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Face ID</title>

<style>

body{
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
  padding: 30px;
}

h1{
  font-size: 36px;
  margin-bottom: 5px;
}

#company{
  font-size: 18px;
  color: #666;
  margin-bottom: 30px;
}

button{
  margin-top: 25px;
  font-size: 22px;
  padding: 18px;
  width: 90%;
  max-width: 330px;
  border: none;
  border-radius: 15px;
  background: #1f7aec;
  color: white;
}

#status{
  margin-top: 25px;
  font-size: 22px;
  font-weight: bold;
}

#photoName{
  margin-top: 20px;
  font-size: 18px;
  color: #555;
}

</style>

</head>

<body>

<h1>Face ID</h1>

<div id="company">
КазЭкспоМонтаж
</div>

<input
type="file"
accept="image/*"
capture="user"
id="photo"
style="display:none;"
onchange="showPhotoName()"
>

<label for="photo" style="
display:inline-block;
margin-top:25px;
font-size:22px;
padding:18px;
width:90%;
max-width:330px;
border:none;
border-radius:15px;
background:#444;
color:white;
cursor:pointer;
">
Сделать фотографию
</label>

<div id="photoName">
Фото не выбрано
</div>

<br>

<button onclick="uploadPhoto('start')">
Отправить фото при начале работы
</button>

<br>

<button onclick="uploadPhoto('end')">
Отправить фото в конце работы
</button>

<div id="status">
Ожидание фото
</div>

<script>

var trackingTimer = null;
var currentEmployee = null;

var SERVER_URL =
  "https://problem-squeamish-unlawful.ngrok-free.dev";

function showPhotoName(){

  var photoInput =
    document.getElementById("photo");

  var photoName =
    document.getElementById("photoName");

  if(photoInput.files.length > 0){

    photoName.innerHTML =
      "Фото выбрано";

  }
}

async function uploadPhoto(action){

  var photoInput =
    document.getElementById("photo");

  var status =
    document.getElementById("status");

  if(!photoInput.files || photoInput.files.length === 0){

    alert("Сделайте фотографию");

    return;
  }

  status.innerHTML =
    "Проверка лица...";

  var formData =
    new FormData();

  formData.append(
    "photo",
    photoInput.files[0]
  );

  formData.append(
    "action",
    action
  );

  try{

    var response =
      await fetch(
        SERVER_URL + "/recognize",
        {
          method: "POST",
          body: formData
        }
      );

    var data =
      await response.json();

    status.innerHTML =
      data.message;

    if(data.success === true){

      currentEmployee =
        data.employee;

      if(action === "start"){

        startGpsTracking();

      }

      if(action === "end"){

        stopGpsTracking();

      }
    }

  }

  catch(e){

    status.innerHTML =
      "Ошибка соединения";

  }
}

function startGpsTracking(){

  if(!navigator.geolocation){

    document.getElementById("status").innerHTML =
      "GPS не поддерживается";

    return;
  }

  sendGpsPoint("gps_start");

  if(trackingTimer !== null){

    clearInterval(trackingTimer);

  }

  trackingTimer =
    setInterval(function(){

      sendGpsPoint("gps_track");

    }, 30000);
}

function stopGpsTracking(){

  sendGpsPoint("gps_end");

  if(trackingTimer !== null){

    clearInterval(trackingTimer);

    trackingTimer = null;

  }
}

function sendGpsPoint(action){

  navigator.geolocation.getCurrentPosition(

    async function(position){

      var gpsData = {
        employee: currentEmployee,
        action: action,
        latitude: position.coords.latitude,
        longitude: position.coords.longitude,
        accuracy: position.coords.accuracy
      };

      await fetch(
        SERVER_URL + "/gps",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(gpsData)
        }
      );

    },

    function(error){

      document.getElementById("status").innerHTML =
        "GPS не разрешен";

    },

    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );
}

</script>

</body>
</html>
